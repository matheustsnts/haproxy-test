apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-rosa
  namespace: gitops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp-rosa
  template:
    metadata:
      labels:
        app: webapp-rosa
    spec:
      containers:
      - name: webapp-rosa
        image: mmumshad/simple-webapp-color
        env:
        - name: APP_COLOR
          value: "pink"
        ports:
        - containerPort: 8080

